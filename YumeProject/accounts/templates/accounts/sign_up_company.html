{% extends 'base.html' %}

{% block title %}Sign Up — Yume{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 p-4 mt-4">
            <h4 class="text-center mb-4">Create an account</h4>

            <div class="d-flex gap-2 mb-4">
                <a href="{% url 'accounts:sign_up_guest' %}" class="btn flex-fill btn-outline-secondary">
                    <i class="bi bi-person me-1"></i> Guest
                </a>
                <a href="{% url 'accounts:sign_up_owner' %}" class="btn flex-fill btn-dark">
                    <i class="bi bi-building me-1"></i> Owner
                </a>
            </div>

            {% include "accounts/sign_up_card.html" %}

            <p class="text-center text-muted small mt-3 mb-0">
                Already have an account? <a href="{% url 'accounts:sign_in' %}" class="text-dark">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
