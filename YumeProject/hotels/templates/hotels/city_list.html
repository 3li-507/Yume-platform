{% extends 'base.html' %}
{% load static %}

{% block title %}Cities{% endblock %}

{% block content %}

<h2>Cities</h2>
<hr>

<div class="row">
    {% for city in cities %}
    <div class="col-3 mb-3">
        <div class="card h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h6 class="mb-0">{{ city.name }}</h6>
                <a href="{% url 'hotels:hotel_list' %}?city={{ city.id }}" class="btn btn-dark btn-sm">
                    View Hotels
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="text-center mt-5">
        <i class="bi bi-geo-alt-fill fs-1"></i>
        <p class="mt-2">No cities available.</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
